name: PR comment

on:
  pull_request:
    paths: ['**/Cargo.lock']

permissions:
  pull-requests: write

jobs:
  capscan-pr-comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Dogfoods this repo's own pr-comment/action.yml against its own PRs.
      - uses: ./pr-comment
        with:
          min-severity: low
